name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  framework-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run framework tests
        run: |
          result=0
          bash framework/lib/tests/helpers.test.sh || result=$?
          bash framework/lib/tests/gate-runner.test.sh || result=$?
          bash framework/lib/tests/validate.test.sh || result=$?
          bash framework/lib/tests/integration.test.sh || result=$?
          exit $result

  skill-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install test dependencies
        run: pip install pytest

      - name: Run skill tests
        run: python3 -m pytest skill/tests/ -v

  version-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check version sync
        run: |
          VERSION=$(cat VERSION)
          PLUGIN_VERSION=$(python3 -c "import json;print(json.load(open('.claude-plugin/plugin.json'))['version'])")
          if [ "$VERSION" != "$PLUGIN_VERSION" ]; then
            echo "❌ Version mismatch: VERSION=$VERSION, plugin.json=$PLUGIN_VERSION"
            exit 1
          fi
          echo "✅ Version sync verified: $VERSION"

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Check syntax
        run: |
          python3 -m py_compile skill/mcp_server.py
          python3 -m py_compile skill/update_settings.py
          bash -n skill/init.sh
