name: "stop-run-tests"
description: "Block ending the turn when code files were edited but no test command ran"
hook: "Stop"
matcher: "*"
condition: |
  input=$(cat)
  tp=$(jq -r '.transcript_path // empty' <<< "$input")
  [ -n "$tp" ] && [ -f "$tp" ] || exit 1
  source "$GATES_LIB_DIR/transcript-helpers.sh"
  since=$(th_tools_since_last "$tp" '(mix test|pytest|npm test|go test)')
  printf '%s\n' "$since" | awk -F'\t' '$1=="Edit"||$1=="Write"{print $2}' \
      | grep -qE '\.(ex|exs|py|js|ts)"' || exit 1
  exit 0
decision: "block"
message: "Code files were edited since the last test run (or no test command has run this session). Run the tests before finishing."
tags: ["orchestration", "definition-of-done"]
severity: "medium"
